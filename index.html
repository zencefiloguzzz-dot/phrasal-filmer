html<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    .ar-wrap { position:fixed; inset:0; width:100%; height:100%; }
  </style>
</head>
<body>

<div class="ar-wrap">
<a-scene id="scene_cuw"
  mindar-image="imageTargetSrc: https://zencefiloguzzz-dot.github.io/phrasal-filmer/markers/cuw.mind; autoStart: true; uiLoading: false; uiScanning: false;"
  embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
  renderer="antialias: false; colorManagement: false;">
  <a-assets>
    <video id="vid_cuw"
      src="https://zencefiloguzzz-dot.github.io/phrasal-filmer/videolar/cuw.mp4.mp4"
      playsinline webkit-playsinline preload="auto"></video>
  </a-assets>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity id="t_cuw" mindar-image-target="targetIndex: 0">
    <a-video id="plane_cuw" src="#vid_cuw"
      position="0 0.4 0"
      width="1.6" height="0.9"
      visible="false"
      material="side: double;">
    </a-video>
  </a-entity>
</a-scene>
</div>

<script>
const vid_cuw = document.getElementById('vid_cuw');
const plane_cuw = document.getElementById('plane_cuw');

function playVideo(vid, plane) {
  plane.setAttribute('visible', 'true');
  vid.currentTime = 0;
  vid.muted = false;
  vid.play().catch(() => { vid.muted = true; vid.play(); });
}

function stopVideo(vid, plane) {
  setTimeout(() => {
    vid.pause(); vid.currentTime = 0;
    plane.setAttribute('visible', 'false');
  }, 1500);
}

document.getElementById('scene_cuw').addEventListener('arReady', () => {
  document.getElementById('t_cuw').addEventListener('targetFound', () => playVideo(vid_cuw, plane_cuw));
  document.getElementById('t_cuw').addEventListener('targetLost', () => stopVideo(vid_cuw, plane_cuw));
  setTimeout(() => addScene('lft'), 500);
});

function addScene(key) {
  const wrap = document.createElement('div');
  wrap.className = 'ar-wrap';
  wrap.style.pointerEvents = 'none';
  const mindUrl = 'https://zencefiloguzzz-dot.github.io/phrasal-filmer/markers/' + key + '.mind';
  const vidUrl = 'https://zencefiloguzzz-dot.github.io/phrasal-filmer/videolar/' + key + '.mp4.mp4';
  wrap.innerHTML = `
    <a-scene id="scene_${key}"
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: false; uiScanning: false;"
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
      renderer="antialias: false; colorManagement: false;" style="width:100%;height:100%;">
      <a-assets>
        <video id="vid_${key}" src="${vidUrl}" playsinline webkit-playsinline preload="auto"></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="t_${key}" mindar-image-target="targetIndex: 0">
        <a-video id="plane_${key}" src="#vid_${key}"
          position="0 0.4 0" width="1.6" height="0.9"
          visible="false" material="side: double;">
        </a-video>
      </a-entity>
    </a-scene>`;
  document.body.appendChild(wrap);

  document.getElementById('scene_' + key).addEventListener('arReady', () => {
    const vid = document.getElementById('vid_' + key);
    const plane = document.getElementById('plane_' + key);
    document.getElementById('t_' + key).addEventListener('targetFound', () => playVideo(vid, plane));
    document.getElementById('t_' + key).addEventListener('targetLost', () => stopVideo(vid, plane));
    if (key === 'lft') setTimeout(() => addScene('roo'), 500);
  });
}

document.body.addEventListener('touchstart', function unlock() {
  [vid_cuw].forEach(v => {
    v.muted = true;
    v.play().then(() => { v.pause(); v.muted = false; }).catch(() => {});
  });
}, { once: true });

window.addEventListener('orientationchange', () => {
  setTimeout(() => window.dispatchEvent(new Event('resize')), 300);
});
</script>
</body>
</html>
